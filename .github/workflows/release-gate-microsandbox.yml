name: Release Gate (weft-microsandbox)

on:
  push:
    tags:
      - "weft_microsandbox/v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.11"

jobs:
  test-microsandbox-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,microsandbox]"

      - name: Run Microsandbox extension tests
        run: |
          pytest -q -n 0 extensions/weft_microsandbox/tests --durations=50 --durations-min=1.0 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

  publish-release:
    needs:
      - test-microsandbox-extension
    uses: ./.github/workflows/release.yml
    with:
      package_name: weft-microsandbox
      package_dir: extensions/weft_microsandbox
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ github.sha }}
      expected_tag_commit: ${{ github.sha }}
      create_github_release: false
    permissions:
      actions: read
      contents: write
      id-token: write
