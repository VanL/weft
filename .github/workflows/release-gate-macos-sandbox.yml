name: Release Gate (weft-macos-sandbox)

on:
  push:
    tags:
      - "weft_macos_sandbox/v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos-sandbox-extension:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,macos-sandbox]"

      - name: Run macOS sandbox extension tests
        run: |
          pytest -q -n 0 extensions/weft_macos_sandbox/tests

  publish-release:
    needs:
      - test-macos-sandbox-extension
    uses: ./.github/workflows/release.yml
    with:
      package_name: weft-macos-sandbox
      package_dir: extensions/weft_macos_sandbox
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ github.sha }}
      expected_tag_commit: ${{ github.sha }}
      create_github_release: false
    permissions:
      contents: write
      id-token: write
