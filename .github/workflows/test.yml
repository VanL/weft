name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  UV_VERSION: "0.11.11"

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.python-version }}, ${{ matrix.test_slice }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
        test_slice: [cli, core-commands, remaining]
        include:
          - test_slice: cli
            pytest_targets: tests/cli
          - test_slice: core-commands
            pytest_targets: tests/commands tests/core
          - test_slice: remaining
            pytest_targets: tests/architecture tests/context tests/helpers tests/shell tests/specs tests/system tests/tasks tests/taskspec tests/test_harness_registration.py

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,docker,django,macos-sandbox]"

    - name: Run tests with pytest
      if: ${{ matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13' }}
      run: |
        pytest -v --tb=short -m "not slow" ${{ matrix.pytest_targets }} --override-ini="addopts=-ra -q --strict-markers -n logical --dist load" --durations=50 --durations-min=1.0

    - name: Run tests with coverage
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
      run: |
        pytest -v --tb=short -m "not slow" ${{ matrix.pytest_targets }} --override-ini="addopts=-ra -q --strict-markers -n logical --dist load" --durations=50 --durations-min=1.0 --cov=weft --cov-report=term-missing --cov-report=xml:coverage-${{ matrix.test_slice }}.xml

    - name: Upload coverage reports
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        file: ./coverage-${{ matrix.test_slice }}.xml
        flags: unittests,${{ matrix.test_slice }}
        name: codecov-${{ matrix.test_slice }}
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: VanL/weft

    - name: Test CLI installation
      if: ${{ matrix.test_slice == 'cli' }}
      run: |
       weft --version

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,docker,django,macos-sandbox]"

    - name: Run linting with ruff
      run: |
        ruff check weft tests integrations/weft_django extensions/weft_docker extensions/weft_macos_sandbox

    - name: Check formatting with ruff
      run: |
        ruff format --check weft tests integrations/weft_django extensions/weft_docker extensions/weft_macos_sandbox

    - name: Type check with mypy
      run: |
        mypy weft integrations/weft_django/weft_django extensions/weft_docker/weft_docker extensions/weft_macos_sandbox/weft_macos_sandbox --config-file pyproject.toml

  test-django-integration:
    # Release commits are covered by the root tag release gate, which keeps
    # bundled extension proof on the publishing path without rerunning it here.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,django]"

    - name: Run Django integration tests
      run: |
        pytest -q -n 0 integrations/weft_django/tests --durations=50 --durations-min=1.0

  test-docker-extension:
    # Release commits are covered by the root tag release gate, which keeps
    # bundled extension proof on the publishing path without rerunning it here.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,docker,django]"

    - name: Verify Docker is available
      run: |
        docker version

    - name: Run Docker extension tests
      run: |
        pytest -q -n 0 extensions/weft_docker/tests --durations=50 --durations-min=1.0

  test-macos-sandbox-extension:
    # Release commits are covered by the root tag release gate, which keeps
    # bundled extension proof on the publishing path without rerunning it here.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: macos-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,django,macos-sandbox]"

    - name: Run macOS sandbox extension tests
      run: |
        pytest -q -n 0 extensions/weft_macos_sandbox/tests --durations=50 --durations-min=1.0
