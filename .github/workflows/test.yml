name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  UV_VERSION: "0.11.11"

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.python-version }}, ${{ matrix.test_slice }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
        test_slice: [cli, core-commands, remaining]
        include:
          - test_slice: cli
            pytest_targets: tests/cli
            pytest_diagnostic_args: --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace
          - test_slice: core-commands
            pytest_targets: tests/commands tests/core
            pytest_diagnostic_args: --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace
          - test_slice: remaining
            pytest_targets: tests/architecture tests/context tests/helpers tests/shell tests/specs tests/system tests/tasks tests/taskspec tests/test_harness_registration.py
            pytest_diagnostic_args: --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,docker,django,macos-sandbox]"

    - name: Set pytest worker count
      run: |
        python bin/pytest-worker-count --github-env

    - name: Run tests with pytest
      if: ${{ matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13' }}
      run: |
        pytest -v --tb=short -m "not slow" ${{ matrix.pytest_targets }} --override-ini="addopts=-ra -q --strict-markers -n logical --dist load" ${{ matrix.pytest_diagnostic_args }}

    - name: Run tests with coverage
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
      env:
        COVERAGE_FILE: .coverage.${{ matrix.test_slice }}
      run: |
        pytest -v --tb=short -m "not slow" ${{ matrix.pytest_targets }} --override-ini="addopts=-ra -q --strict-markers -n logical --dist load" ${{ matrix.pytest_diagnostic_args }} --cov=weft --cov-report=term-missing

    - name: Upload coverage data
      if: ${{ always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-data-${{ matrix.test_slice }}
        path: .coverage.${{ matrix.test_slice }}
        if-no-files-found: warn
        include-hidden-files: true

    - name: Test CLI installation
      if: ${{ matrix.test_slice == 'cli' }}
      run: |
       weft --version

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs: test
    if: ${{ always() && !cancelled() }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Download coverage data
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: coverage-data-*
        path: coverage-data
        merge-multiple: true

    - name: Combine coverage reports
      run: |
        coverage combine coverage-data
        coverage report
        coverage xml -o coverage.xml

    - name: Upload coverage report
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: VanL/weft

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,docker,django,macos-sandbox]"

    - name: Run linting with ruff
      run: |
        ruff check weft tests integrations/weft_django extensions/weft_docker extensions/weft_macos_sandbox

    - name: Check formatting with ruff
      run: |
        ruff format --check weft tests integrations/weft_django extensions/weft_docker extensions/weft_macos_sandbox

    - name: Type check with mypy
      run: |
        mypy weft bin integrations/weft_django/weft_django extensions/weft_docker/weft_docker extensions/weft_macos_sandbox/weft_macos_sandbox --config-file pyproject.toml

  test-django-integration:
    # Release commits are covered by the root tag release gate, which keeps
    # bundled extension proof on the publishing path without rerunning it here.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,django]"

    - name: Run Django integration tests
      run: |
        pytest -q -n 0 integrations/weft_django/tests --durations=50 --durations-min=1.0 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

  test-docker-extension:
    # Release commits are covered by the root tag release gate, which keeps
    # bundled extension proof on the publishing path without rerunning it here.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,docker,django]"

    - name: Verify Docker is available
      run: |
        docker version

    - name: Run Docker extension tests
      run: |
        pytest -q -n 0 extensions/weft_docker/tests --durations=50 --durations-min=1.0 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

  test-macos-sandbox-extension:
    # Release commits are covered by the root tag release gate, which keeps
    # bundled extension proof on the publishing path without rerunning it here.
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: macos-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,django,macos-sandbox]"

    - name: Run macOS sandbox extension tests
      run: |
        pytest -q -n 0 extensions/weft_macos_sandbox/tests --durations=50 --durations-min=1.0 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace
