name: Release Gate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-sqlite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,docker,macos-sandbox]"

      - name: Run full SQLite suite
        run: |
          pytest -v --tb=short -m "" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup"

  test-postgres:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Run PG-compatible suite
        run: |
          uv run --extra dev --extra docker --extra macos-sandbox bin/pytest-pg --all

  verify-tag-current:
    runs-on: ubuntu-latest
    needs:
      - test-sqlite
      - test-postgres

    steps:
      - name: Verify tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the release gate was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  publish-release:
    needs:
      - verify-tag-current
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ github.sha }}
      expected_tag_commit: ${{ github.sha }}
    permissions:
      contents: write
      id-token: write
