name: Release Gate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-sqlite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run full SQLite suite
        run: |
          pytest -v --tb=short -m "" --override-ini="addopts=-ra -q --strict-markers -n auto --dist loadgroup"

  test-postgres:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Run PG-compatible suite
        run: |
          uv run bin/pytest-pg --all

  create-release:
    runs-on: ubuntu-latest
    needs:
      - test-sqlite
      - test-postgres

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
