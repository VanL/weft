name: Release Gate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.11"

jobs:
  test-django-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,django]"

      - name: Run Django integration tests
        run: |
          pytest -q -n 0 integrations/weft_django/tests --durations=50 --durations-min=1.0

  test-docker-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,docker]"

      - name: Verify Docker is available
        run: |
          docker version

      - name: Run Docker extension tests
        run: |
          pytest -q -n 0 extensions/weft_docker/tests --durations=50 --durations-min=1.0

  test-macos-sandbox-extension:
    runs-on: macos-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,macos-sandbox]"

      - name: Run macOS sandbox extension tests
        run: |
          pytest -q -n 0 extensions/weft_macos_sandbox/tests --durations=50 --durations-min=1.0

  test-sqlite:
    name: test-sqlite (${{ matrix.test_slice }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        test_slice: [cli, core-commands, remaining]
        include:
          - test_slice: cli
            pytest_targets: tests/cli
          - test_slice: core-commands
            pytest_targets: tests/commands tests/core
          - test_slice: remaining
            pytest_targets: tests/architecture tests/context tests/helpers tests/shell tests/specs tests/system tests/tasks tests/taskspec tests/test_harness_registration.py

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,docker,macos-sandbox]"

      - name: Set pytest worker count
        run: |
          python bin/pytest-worker-count --github-env

      - name: Run full SQLite suite
        run: |
          pytest -v --tb=short -m "" ${{ matrix.pytest_targets }} --override-ini="addopts=-ra -q --strict-markers -n logical --dist load" --durations=50 --durations-min=1.0

  test-postgres:
    name: test-postgres (${{ matrix.test_slice }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        test_slice: [cli, core-commands, remaining]
        include:
          - test_slice: cli
            pytest_targets: tests/cli
          - test_slice: core-commands
            pytest_targets: tests/commands tests/core
          - test_slice: remaining
            pytest_targets: tests/architecture tests/context tests/helpers tests/shell tests/specs tests/system tests/tasks tests/taskspec tests/test_harness_registration.py

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set pytest worker count
        run: |
          python bin/pytest-worker-count --github-env

      - name: Run PG-compatible suite
        env:
          PYTEST_ADDOPTS: "--durations=50 --durations-min=1.0"
        run: |
          uv run --extra dev --extra docker --extra macos-sandbox bin/pytest-pg --all ${{ matrix.pytest_targets }}

  verify-tag-current:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs:
      - test-django-integration
      - test-docker-extension
      - test-macos-sandbox-extension
      - test-sqlite
      - test-postgres

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the release gate was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  publish-release:
    needs:
      - verify-tag-current
    uses: ./.github/workflows/release.yml
    with:
      package_name: weft
      package_dir: .
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ github.sha }}
      expected_tag_commit: ${{ github.sha }}
      create_github_release: true
    permissions:
      actions: read
      contents: write
      id-token: write
