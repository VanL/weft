name: Release Gate (weft-docker)

on:
  push:
    tags:
      - "weft_docker/v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-docker-extension:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,docker]"

      - name: Verify Docker is available
        run: |
          docker version

      - name: Run Docker extension tests
        run: |
          pytest -q -n 0 extensions/weft_docker/tests

  publish-release:
    needs:
      - test-docker-extension
    uses: ./.github/workflows/release.yml
    with:
      package_name: weft-docker
      package_dir: extensions/weft_docker
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ github.sha }}
      expected_tag_commit: ${{ github.sha }}
      create_github_release: false
    permissions:
      actions: read
      contents: write
      id-token: write
