name: Release

on:
  workflow_call:
    inputs:
      package_name:
        description: Package name to publish to PyPI.
        required: true
        type: string
      package_dir:
        description: Package directory to build from.
        required: true
        type: string
      tag_name:
        description: Release tag to publish and attach artifacts to.
        required: true
        type: string
      release_ref:
        description: Git ref to check out for the release build.
        required: true
        type: string
      expected_tag_commit:
        description: Commit SHA the release tag is expected to reference.
        required: true
        type: string
      create_github_release:
        description: Whether to create a GitHub Release for this tag.
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify checked out commit matches tested release commit
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_tag_commit }}"

      - name: Build package
        working-directory: ${{ inputs.package_dir }}
        run: |
          uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-python-package-distributions
          path: ${{ inputs.package_dir }}/dist/

  verify-main-test-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for successful Test workflow on release commit
        uses: actions/github-script@v8
        env:
          EXPECTED_SHA: ${{ inputs.expected_tag_commit }}
          POLL_INTERVAL_SECONDS: "30"
          MAX_WAIT_SECONDS: "2700"
        with:
          script: |
            const expectedSha = process.env.EXPECTED_SHA;
            const pollIntervalMs =
              Number(process.env.POLL_INTERVAL_SECONDS || "30") * 1000;
            const maxWaitMs =
              Number(process.env.MAX_WAIT_SECONDS || "2700") * 1000;
            const deadline = Date.now() + maxWaitMs;

            while (Date.now() < deadline) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "test.yml",
                event: "push",
                head_sha: expectedSha,
                per_page: 20,
              });

              const runs = response.data.workflow_runs
                .filter(
                  (run) =>
                    run.head_sha === expectedSha &&
                    ["main", "master"].includes(run.head_branch ?? ""),
                )
                .sort((left, right) => {
                  const leftTimestamp = Date.parse(
                    left.run_started_at ?? left.created_at,
                  );
                  const rightTimestamp = Date.parse(
                    right.run_started_at ?? right.created_at,
                  );
                  return rightTimestamp - leftTimestamp;
                });

              if (runs.length === 0) {
                core.info(
                  `No Test workflow run found yet for ${expectedSha}; waiting ${pollIntervalMs / 1000}s`,
                );
              } else {
                const latest = runs[0];
                core.info(
                  `Observed Test workflow run ${latest.id} (${latest.html_url}) status=${latest.status} conclusion=${latest.conclusion}`,
                );
                if (latest.status === "completed") {
                  if (latest.conclusion === "success") {
                    return;
                  }
                  core.setFailed(
                    `Test workflow ${latest.html_url} concluded ${latest.conclusion} for ${expectedSha}`,
                  );
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

            core.setFailed(
              `Timed out waiting for a successful Test workflow run on ${expectedSha}`,
            );

  verify-tag-current:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Verify release tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ inputs.expected_tag_commit }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags "https://github.com/${REPOSITORY}.git" "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the publish workflow was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
      - verify-main-test-workflow
      - verify-tag-current
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ format('https://pypi.org/p/{0}', inputs.package_name) }}
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package_name }}-python-package-distributions
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Publish distribution to PyPI
        run: uv publish --trusted-publishing always dist/*

  github-release:
    name: Sign and upload to GitHub Release
    if: ${{ inputs.create_github_release }}
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package_name }}-python-package-distributions
          path: dist/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.tag_name }}
          files: dist/*
