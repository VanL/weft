name: Release Gate (weft-django)

on:
  push:
    tags:
      - "weft_django/v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.11"

jobs:
  test-django-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,django]"

      - name: Run Django integration tests
        run: |
          pytest -q -n 0 integrations/weft_django/tests --durations=50 --durations-min=1.0 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

  publish-release:
    needs:
      - test-django-integration
    uses: ./.github/workflows/release.yml
    with:
      package_name: weft-django
      package_dir: integrations/weft_django
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ github.sha }}
      expected_tag_commit: ${{ github.sha }}
      create_github_release: false
    permissions:
      actions: read
      contents: write
      id-token: write
